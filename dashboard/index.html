<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Command Center — Live Cockpit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1a1f;
            --card-bg: #242428;
            --border: #3a3a42;
            --text: #f8f7f4;
            --muted: #c8c5be;
            --accent: #FF0000;
            --yellow: #e2b53e;
            --gray: #4a4a52;
            --radius: 14px;
            --transition: all 0.2s ease;
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header */
        header {
            padding: 24px 40px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, #212126, var(--bg));
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            background-color: var(--accent);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 0, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.02em;
        }

        .header-meta {
            display: flex;
            gap: 16px;
            align-items: center;
            font-size: 13px;
            color: var(--muted);
        }

        .meta-item {
            background: var(--card-bg);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        /* Main Layout */
        main {
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* KPI Section */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .kpi-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
        }

        .kpi-card:hover {
            border-color: #4a4a52;
            transform: translateY(-2px);
        }

        .kpi-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--muted);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .kpi-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text);
        }

        .kpi-card.high .kpi-value { color: var(--accent); }
        .kpi-card.medium .kpi-value { color: var(--yellow); }
        .kpi-card.low .kpi-value { color: var(--muted); }

        /* Status Indicator */
        .status-bar {
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 16px;
            background: var(--card-bg);
            padding: 12px 24px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            width: fit-content;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--muted);
        }

        .status-indicator.running {
            background: var(--yellow);
            animation: blink 1s infinite;
        }

        .status-indicator.done {
            background: #4caf50;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        /* Issues Table */
        .table-container {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 32px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(0, 0, 0, 0.2);
            color: var(--muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 16px 24px;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            color: var(--text);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-high { background: var(--accent); color: #fff; }
        .badge-medium { background: var(--yellow); color: #1a1a1f; }
        .badge-low { background: var(--gray); color: var(--muted); }

        /* Recommendations */
        .recommendations {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
        }

        .recommendations h2 {
            font-size: 18px;
            margin: 0 0 16px 0;
            font-weight: 600;
        }

        #recommendations-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .rec-item {
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            color: var(--muted);
            font-size: 14px;
            display: flex;
            gap: 12px;
        }

        .rec-item:last-child {
            border-bottom: none;
        }

        .rec-item::before {
            content: "→";
            color: var(--accent);
            font-weight: bold;
        }

        @media (max-width: 768px) {
            header { padding: 16px 20px; flex-direction: column; align-items: flex-start; gap: 16px; }
            main { padding: 20px; }
            .kpi-grid { grid-template-columns: 1fr 1fr; }
        }

        @media (max-width: 480px) {
            .kpi-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">
            <div class="pulse-dot"></div>
            <h1>SEO Command Center</h1>
        </div>
        <div class="header-meta">
            <div class="meta-item">Site: <span id="site-name">Loading...</span></div>
            <div class="meta-item"><span id="url-count">0</span> URLs crawled</div>
        </div>
    </header>

    <main>
        <div class="status-bar">
            <div id="status-dot" class="status-indicator"></div>
            <span id="status-text" style="font-size: 13px; font-weight: 500; color: var(--muted);">Initializing audit...</span>
        </div>

        <div class="kpi-grid">
            <div class="kpi-card">
                <div class="kpi-label">Total Issues</div>
                <div class="kpi-value" id="total-issues">0</div>
            </div>
            <div class="kpi-card high">
                <div class="kpi-label">High Severity</div>
                <div class="kpi-value" id="high-count">0</div>
            </div>
            <div class="kpi-card medium">
                <div class="kpi-label">Medium Severity</div>
                <div class="kpi-value" id="medium-count">0</div>
            </div>
            <div class="kpi-card low">
                <div class="kpi-label">Low Severity</div>
                <div class="kpi-value" id="low-count">0</div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 120px;">Severity</th>
                        <th>Issue Type</th>
                        <th style="width: 100px; text-align: center;">Count</th>
                        <th>Description</th>
                    </tr>
                </thead>
                <tbody id="issues-table-body">
                    <tr>
                        <td colspan="4" style="text-align: center; color: var(--muted); padding: 40px;">
                            Awaiting audit data...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="recommendations">
            <h2>Prioritized Fixes</h2>
            <div id="recommendations-list">
                <div class="rec-item">Run the audit to generate a prioritized action plan.</div>
            </div>
        </div>
    </main>

    <script src="/app.js"></script>
</body>
</html>
