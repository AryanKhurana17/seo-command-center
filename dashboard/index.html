<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Command Center — Live Cockpit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d12;
            --card-bg: #1a1a22;
            --border: #2a2a35;
            --text: #f0efe9;
            --muted: #8a8a95;
            --accent: #FF0000;
            --green: #22c55e;
            --yellow: #e2b53e;
            --blue: #3b82f6;
            --gray: #4a4a52;
            --radius: 12px;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            line-height: 1.5;
        }

        /* Header */
        header {
            padding: 18px 32px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, #141419, var(--bg));
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .pulse-dot {
            width: 10px; height: 10px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(255,0,0,0.7);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255,0,0,0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255,0,0,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,0,0,0); }
        }

        h1 { font-size: 18px; font-weight: 700; margin: 0; letter-spacing: -0.01em; }

        .header-meta {
            display: flex; gap: 12px; font-size: 12px; color: var(--muted);
        }

        .meta-item {
            background: var(--card-bg);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        /* Main */
        main { padding: 28px 32px; max-width: 1600px; margin: 0 auto; width: 100%; }

        /* KPI Grid */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }

        .kpi-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            text-align: center;
        }

        .kpi-value {
            font-size: 36px;
            font-weight: 700;
            display: block;
        }

        .kpi-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
            font-weight: 600;
            margin-top: 4px;
        }

        .kpi-card.urls .kpi-value { color: var(--blue); }
        .kpi-card.high .kpi-value { color: var(--accent); }
        .kpi-card.medium .kpi-value { color: var(--yellow); }
        .kpi-card.low .kpi-value { color: var(--green); }

        /* Table */
        .table-container {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .table-scroll {
            overflow-x: auto;
            max-height: 70vh;
            overflow-y: auto;
        }

        table { width: 100%; border-collapse: collapse; text-align: left; }

        th {
            background: #111118;
            color: var(--muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 14px 16px;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1;
        }

        td {
            padding: 10px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            font-size: 13px;
            color: var(--text);
            vertical-align: middle;
        }

        tr:hover td { background: rgba(255,255,255,0.02); }

        .url-cell {
            color: var(--muted);
            font-size: 12px;
            max-width: 280px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .detail-cell { color: var(--muted); font-size: 12px; }

        .fix-cell { font-size: 12px; }
        .fix-cell.has-fix { color: var(--green); }
        .fix-cell.manual { color: var(--yellow); font-style: italic; }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 100px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .badge-high { background: var(--accent); color: #fff; }
        .badge-medium { background: var(--yellow); color: #0d0d12; }
        .badge-low { background: var(--gray); color: var(--muted); }

        .empty-msg {
            text-align: center;
            color: var(--muted);
            padding: 60px 20px;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            header { padding: 14px 16px; flex-direction: column; gap: 12px; }
            main { padding: 16px; }
            .kpi-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">
            <div class="pulse-dot"></div>
            <h1>SEO Command Center</h1>
        </div>
        <div class="header-meta">
            <div class="meta-item">Site: <span id="site-name">Loading...</span></div>
            <div class="meta-item"><span id="url-count">0</span> URLs crawled</div>
        </div>
    </header>

    <main>
        <div class="kpi-grid">
            <div class="kpi-card urls">
                <span class="kpi-value" id="total-urls">0</span>
                <span class="kpi-label">Total URLs</span>
            </div>
            <div class="kpi-card">
                <span class="kpi-value" id="total-issues">0</span>
                <span class="kpi-label">Total Issues</span>
            </div>
            <div class="kpi-card high">
                <span class="kpi-value" id="high-count">0</span>
                <span class="kpi-label">High</span>
            </div>
            <div class="kpi-card medium">
                <span class="kpi-value" id="medium-count">0</span>
                <span class="kpi-label">Medium</span>
            </div>
            <div class="kpi-card low">
                <span class="kpi-value" id="low-count">0</span>
                <span class="kpi-label">Low</span>
            </div>
        </div>

        <div class="table-container">
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>URL</th>
                            <th>Issue Type</th>
                            <th>Severity</th>
                            <th>Detail</th>
                        </tr>
                    </thead>
                    <tbody id="issues-table-body">
                        <tr>
                            <td colspan="4" class="empty-msg">Awaiting audit data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="/app.js"></script>
</body>
</html>
